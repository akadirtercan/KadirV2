const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
const resumeAudio=()=>{if(audioCtx.state==="suspended")audioCtx.resume();document.removeEventListener("click",resumeAudio);document.removeEventListener("touchstart",resumeAudio)};

const playTone=(freq,dur,type="sine",vol=0.3)=>{try{audioCtx.resume();const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+dur);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}catch{}};

/* SVG CHART */
function MiniChart({data,color=ACC,h=100,labels,unit="",title=""}){
  if(!data||data.length<2)return<Cd style={{textAlign:"center",padding:20,color:"#444"}}><div style={{fontSize:12}}>{title||"Yeterli veri yok"}</div></Cd>;
  const vals=data.map(d=>typeof d==="object"?d.v:d).filter(v=>v!=null&&!isNaN(v));
  if(vals.length<2)return null;
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const W=320,H=h,pad=24,gW=W-pad*2,gH=H-pad*2;
  const pts=vals.map((v,i)=>{const x=pad+i*(gW/(vals.length-1));const y=pad+gH-(((v-mn)/rng)*gH);return{x,y,v}});
  const line=pts.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(" ");
  const area=line+` L${pts[pts.length-1].x},${H-4} L${pts[0].x},${H-4} Z`;
  const gid="g"+color.replace("#","")+(Math.random()*1000|0);
  return<Cd style={{padding:"12px 8px"}}>
    {title&&<div style={{fontSize:13,fontWeight:700,color:"#ddd",marginBottom:8,paddingLeft:6}}>{title}</div>}
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:h}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill={`url(#${gid})`}/><path d={line} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3.5" fill={color} stroke="#1a1a24" strokeWidth="2"/>)}
      {pts.map((p,i)=><text key={`t${i}`} x={p.x} y={p.y-10} fill="#888" fontSize="9" textAnchor="middle" fontFamily="inherit">{p.v}{unit}</text>)}
      {labels&&labels.map((l,i)=>{const x=pad+i*(gW/(labels.length-1));return<text key={`l${i}`} x={x} y={H-2} fill="#555" fontSize="8" textAnchor="middle" fontFamily="inherit">{l}</text>})}
    </svg></Cd>}
/* CALENDAR */
function Cal({selected,onSelect,dotsFn}){
  const sel=selected instanceof Date?selected:new Date(selected);
  const[vy,sVy]=useState(sel.getFullYear());const[vm,sVm]=useState(sel.getMonth());
  const fd=(new Date(vy,vm,1).getDay()+6)%7,dim=new Date(vy,vm+1,0).getDate();
  const c=[];for(let i=0;i<fd;i++)c.push(null);for(let d=1;d<=dim;d++)c.push(d);
  const pv=()=>{if(vm===0){sVm(11);sVy(y=>y-1)}else sVm(m=>m-1)};
  const nx=()=>{if(vm===11){sVm(0);sVy(y=>y+1)}else sVm(m=>m+1)};
  return(<Cd style={{padding:"14px 10px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><NB onClick={pv}>‹</NB><span style={{fontSize:15,fontWeight:700,color:"#fff"}}>{MO[vm]} {vy}</span><NB onClick={nx}>›</NB></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,textAlign:"center"}}>
      {DS.map(d=><div key={d} style={{fontSize:10,color:"#555",padding:3,fontWeight:600}}>{d}</div>)}
      {c.map((day,i)=>{if(!day)return<div key={`e${i}`}/>;
        const dt=new Date(vy,vm,day),iS=sameDay(dt,sel),iT=sameDay(dt,NOW),da=dotsFn?.(dt)||[];
        return(<div key={`d${day}`} onClick={()=>onSelect(new Date(vy,vm,day))} style={{padding:"7px 2px",borderRadius:10,cursor:"pointer",position:"relative",
          background:iS?ACC:iT?"rgba(124,92,252,0.15)":"transparent",color:iS?"#fff":iT?"#B39DFF":"#aaa",fontWeight:iS||iT?700:400,fontSize:13}}>
          {day}{da.length>0&&<div style={{display:"flex",gap:2,justifyContent:"center",position:"absolute",bottom:1,left:"50%",transform:"translateX(-50%)"}}>
            {da.slice(0,4).map((cl,j)=><div key={j} style={{width:4,height:4,borderRadius:2,background:cl}}/>)}</div>}</div>)})}</div></Cd>)}
/* REST TIMER */
function RTimer({seconds:init,onDone,onClose,color}){
  const[left,sL]=useState(init);const[paused,sP]=useState(false);const[done,sD]=useState(false);
  useEffect(()=>{sL(init);sP(false);sD(false)},[init]);
  useEffect(()=>{if(paused||done)return;if(left<=0){sD(true);onDone();return}const t=setTimeout(()=>sL(l=>l-1),1000);return()=>clearTimeout(t)},[left,paused,done,onDone]);
  if(done)return<div style={{background:"rgba(0,200,150,0.1)",borderRadius:14,padding:"14px 18px",marginBottom:14,textAlign:"center"}}><span style={{fontSize:15,fontWeight:700,color:"#00C896"}}>✓ Dinlenme bitti!</span><br/><Pill bg="#00C896" active onClick={onClose} style={{marginTop:8}}>Kapat</Pill></div>;
  const p=init>0?(left/init)*100:0;
  return(<div style={{background:"rgba(124,92,252,0.08)",borderRadius:14,padding:"14px 18px",marginBottom:14,border:"1px solid rgba(124,92,252,0.2)"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:13,color,fontWeight:600}}>⏱ Dinlenme</span><span style={{fontSize:28,fontWeight:900,fontVariantNumeric:"tabular-nums",color,letterSpacing:2}}>{fT(left)}</span></div>
    <div style={{height:4,borderRadius:2,background:"rgba(255,255,255,0.08)",marginTop:10}}><div style={{height:4,borderRadius:2,background:color,width:`${p}%`,transition:"width 1s linear"}}/></div>
    <div style={{display:"flex",gap:8,marginTop:10,justifyContent:"center"}}>
      <Pill bg={color} active onClick={()=>sP(x=>!x)}>{paused?"▶ Devam":"⏸ Durdur"}</Pill>
      <Pill bg="#555" active onClick={()=>{sL(init);sP(false);sD(false)}}>↻ Sıfırla</Pill>
      <Pill bg="#00C896" active onClick={()=>{sD(true);onDone()}}>✓ Bitir</Pill></div></div>)}

        </div>
      </div>)}
      {/* MIC BUTTON */}
      {hasSpeech&&(<button onClick={startVoice} style={{position:"fixed",bottom:62,right:16,width:48,height:48,borderRadius:24,background:vListen?"#FF3B5C":ACC,color:"#fff",border:"none",cursor:"pointer",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(124,92,252,0.4)",zIndex:55,animation:vListen?"pulse 1s infinite":"none"}}>
        {vListen?"⏹":"🎤"}
      </button>)}
      {/* BOTTOM TAB BAR */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,display:"flex",background:"#13131a",borderTop:"1px solid rgba(255,255,255,0.06)",paddingBottom:"env(safe-area-inset-bottom)",zIndex:50,maxWidth:440,margin:"0 auto"}}>
        {mainTabs.map((t,i)=>{
          if(homeMode==="work"&&(i===1||i===2||i===4))return null;
          if(homeMode==="personal"&&i===3)return null;
          return<button key={i} onClick={()=>sMt(i)} style={{flex:1,padding:"8px 2px 6px",fontSize:9,fontWeight:mt===i?700:400,color:mt===i?ACC:"#555",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
          <span style={{fontSize:18}}>{t.i}</span>{t.l}
        </button>})}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
